<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Смотреть онлайн</title>

<script>
// получаем slug из URL
let slug = window.location.pathname
  .replace(/\//g, '')
  .replace(/[-_]/g, ' ')
  .replace(/[^\w\sа-яА-Я]/g, '')
  .trim();

// если пусто
if (!slug) {
  slug = "Колония 2026";
}

// делаем первую букву большой
slug = slug.charAt(0).toUpperCase() + slug.slice(1);

// итоговый текст
const titleText = slug + " смотреть онлайн";

// ставим title
document.title = titleText;

// вставляем в страницу
window.onload = function() {
  document.getElementById("title").innerText = titleText;
};
</script>

body {
  background:#000;

</head>
